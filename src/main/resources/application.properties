# Server — Railway injects PORT automatically; falls back to 8081 locally
server.port=${PORT:8081}

# PostgreSQL DataSource — Railway injects PG* vars automatically; falls back to local values
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:resume_coach_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Gemini API
gemini.api.key=${GEMINI_API_KEY}

# Clerk JWT validation
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${CLERK_JWKS_URL:https://fleet-asp-35.clerk.accounts.dev/.well-known/jwks.json}

# Clerk publishable key (used by frontend)
clerk.publishable-key=${CLERK_PUBLISHABLE_KEY:pk_test_ZmxlZXQtYXNwLTM1LmNsZXJrLmFjY291bnRzLmRldiQ}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.price-id=${STRIPE_PRICE_ID:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Multipart (for PDF uploads)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
